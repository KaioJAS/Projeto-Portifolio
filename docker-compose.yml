services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: super_portfolio_dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host 0.0.0.0
